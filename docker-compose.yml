services:
  document-cutter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document-cutter
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CUTTER_MYSQL_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
